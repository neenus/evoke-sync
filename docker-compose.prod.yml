services:
  mongo:
    image: mongo:7
    container_name: evoke-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27005:27017"
    networks:
      - evoke-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    image: ${REGISTRY_URL}/evoke-sync-server:${IMAGE_TAG:-latest}
    container_name: evoke-server
    restart: unless-stopped
    ports:
      - "5015:5000"
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - evoke-net
      - auth_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    image: ${REGISTRY_URL}/evoke-sync-client:${IMAGE_TAG:-latest}
    container_name: evoke-client
    restart: unless-stopped
    ports:
      - "3005:80"
    depends_on:
      - server
    networks:
      - evoke-net

volumes:
  mongo_data:

networks:
  evoke-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
  auth_network:
    external: true

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img">
  <title>EvokeSync</title>
  <!-- Navy rounded square -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#0F2044"/>
  <!-- Document body -->
  <rect x="6" y="4" width="18" height="23" rx="2" fill="#1C3565"/>
  <!-- Folded corner -->
  <polygon points="19,4 24,4 24,9" fill="#0F2044"/>
  <polygon points="19,4 24,9 19,9" fill="#E8EEF8" opacity="0.15"/>
  <!-- Ledger lines -->
  <line x1="8"  y1="14" x2="22" y2="14" stroke="#E8EEF8" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="8"  y1="18" x2="22" y2="18" stroke="#E8EEF8" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="8"  y1="22" x2="15" y2="22" stroke="#E8EEF8" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Gold checkmark -->
  <polyline points="13,24 16,28 24,20" fill="none" stroke="#C89A3A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
